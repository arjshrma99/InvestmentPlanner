<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="InvestCalc">
  <title>Investment Calculators</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <nav class="segment" aria-label="Calculator">
      <button class="segment-button active" type="button" data-tab="cross">Complete</button>
      <button class="segment-button" type="button" data-tab="withdrawal">WIthdrwal Only</button>
    </nav>

    <section class="calculator-card active" id="cross" data-panel>
      <h1>Complete Investment Plan <button class="info-button" type="button" aria-label="Complete Investment Plan info" data-tooltip="Models money growing in an initial portfolio while optional monthly transfers and external SIP contributions build a SIP portfolio, with optional withdrawal planning.">!</button></h1>
      <div class="divider"></div>
      <div class="calculator-inputs">
        <div class="input-list" id="cross-inputs"></div>
        <div class="section-box" id="cross-withdrawal-box">
          <label class="check-row">
            <input type="checkbox" id="cross-withdrawal-enabled">
            <span>Add Monthly Withdrawal Plan</span>
            <button class="info-button" type="button" aria-label="Cross investment withdrawal plan info" data-tooltip="Enable monthly withdrawals from the combined portfolio, using SIP portfolios first and the initial portfolio after that.">!</button>
          </label>
          <div class="input-list conditional" id="cross-withdrawal-inputs"></div>
          <div class="conditional" id="cross-withdrawal-options">
            <label class="check-row">
              <input type="checkbox" id="cross-finish-portfolio-enabled">
              <span>Finish portfolio in end</span>
              <button class="info-button" type="button" aria-label="Cross investment finish portfolio in end info" data-tooltip="Calculate the maximum monthly withdrawal that brings the combined portfolio to 0 at the end of the total investment period.">!</button>
            </label>
          </div>
        </div>
        <div class="section-box" id="cross-projection-box">
          <div class="input-list conditional" id="cross-projection-inputs"></div>
        </div>
      </div>
      <div class="metric-grid" id="cross-results"></div>
    </section>

    <section class="calculator-card" id="withdrawal" data-panel hidden>
      <h1>Systematic Withdrawal Plan <button class="info-button" type="button" aria-label="Systematic Withdrawal Plan info" data-tooltip="Estimates how long a portfolio can support withdrawals, sustainable monthly withdrawal, and projected portfolio value over time.">!</button></h1>
      <div class="divider"></div>
      <div class="calculator-inputs">
        <div class="input-list" id="withdrawal-inputs"></div>
        <div class="input-list conditional" id="withdrawal-max-period-inputs"></div>
        <label class="check-row">
          <input type="checkbox" id="withdrawal-finish-portfolio-enabled">
          <span>Finish portfolio in end</span>
          <button class="info-button" type="button" aria-label="Finish portfolio in end info" data-tooltip="Calculate the maximum monthly withdrawal that brings the portfolio to 0 at the end of the projection period.">!</button>
        </label>
      </div>
      <div class="metric-grid" id="withdrawal-results"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
